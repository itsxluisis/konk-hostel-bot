<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Konk Hostel — Admin Panel (Vapi)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#0b0d12; color:#e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
  .card { background:#11151c; border:1px solid #1f2530; border-radius:12px; }
  .btn { background:#2563eb; color:white; padding:8px 14px; border-radius:8px; }
  .btn:disabled { opacity:.5; }
  textarea, input, select { background:#0b0d12; border:1px solid #1f2530; color:#e5e7eb; border-radius:8px; padding:8px; width:100%; }
  .tab { padding:8px 14px; cursor:pointer; border-bottom:2px solid transparent; }
  .tab.active { border-color:#2563eb; color:white; }
  .badge { padding:2px 8px; border-radius:999px; font-size:12px; }
  .badge.warn { background:#7c2d12; color:#fed7aa; }
  .badge.ok { background:#14532d; color:#bbf7d0; }
  .badge.err { background:#7f1d1d; color:#fecaca; }
</style>
</head>
<body>
<div id="root" class="min-h-screen p-6"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const VAPI_BASE = "https://api.vapi.ai";

function useLocalState(key, initial) {
  const [v, setV] = useState(() => {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : initial; } catch { return initial; }
  });
  useEffect(() => { localStorage.setItem(key, JSON.stringify(v)); }, [key, v]);
  return [v, setV];
}

function App() {
  const [apiKey, setApiKey] = useLocalState("vapi_api_key", "");
  const [assistantId, setAssistantId] = useLocalState("vapi_assistant_id", "");
  const [tab, setTab] = useState("prompt");
  const [status, setStatus] = useState({ type: null, msg: "" });

  return (
    <div className="max-w-6xl mx-auto">
      <header className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">Konk Hostel · Admin Panel</h1>
          <p className="text-sm text-gray-400">Vapi assistant control · Konk Hostel automation</p>
        </div>
        <div className="text-right">
          <span className={`badge ${apiKey ? "ok" : "warn"}`}>{apiKey ? "API key cargada" : "Sin API key"}</span>
        </div>
      </header>

      <section className="card p-4 mb-4">
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label className="text-xs text-gray-400">Vapi API key</label>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk_..." />
          </div>
          <div>
            <label className="text-xs text-gray-400">Assistant ID</label>
            <input value={assistantId} onChange={e => setAssistantId(e.target.value)} placeholder="asst_..." />
          </div>
        </div>
      </section>

      <nav className="flex gap-2 mb-4 border-b border-gray-800">
        {[
          ["prompt","Prompt"],
          ["kb","Knowledge Base"],
          ["voice","Voz / Idioma"],
          ["test","Llamada prueba"],
          ["history","Historial"],
          ["emergency","Emergencias"],
        ].map(([k,l]) => (
          <div key={k} className={`tab ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{l}</div>
        ))}
      </nav>

      {status.type && (
        <div className={`mb-3 p-3 rounded ${status.type==="ok"?"bg-green-900/40":"bg-red-900/40"}`}>{status.msg}</div>
      )}

      {tab==="prompt" && <PromptTab apiKey={apiKey} assistantId={assistantId} setStatus={setStatus} />}
      {tab==="kb" && <KbTab />}
      {tab==="voice" && <VoiceTab apiKey={apiKey} assistantId={assistantId} setStatus={setStatus} />}
      {tab==="test" && <TestTab apiKey={apiKey} assistantId={assistantId} setStatus={setStatus} />}
      {tab==="history" && <HistoryTab apiKey={apiKey} setStatus={setStatus} />}
      {tab==="emergency" && <EmergencyTab apiKey={apiKey} setStatus={setStatus} />}

      <footer className="mt-8 text-xs text-gray-500">
        Estado del sistema:&nbsp;
        <span className="badge warn">check_reservation webhook NO desplegado</span>
        &nbsp;·&nbsp;
        <a className="underline" href="../docs/pending-decisions.md">Decisiones pendientes</a>
      </footer>
    </div>
  );
}

function PromptTab({ apiKey, assistantId, setStatus }) {
  const [prompt, setPrompt] = useLocalState("vapi_prompt_draft", "");

  const load = async () => {
    if (!apiKey || !assistantId) return setStatus({type:"err", msg:"Falta API key o Assistant ID"});
    try {
      const r = await fetch(`${VAPI_BASE}/assistant/${assistantId}`, { headers: { Authorization: `Bearer ${apiKey}` }});
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      const sys = data?.model?.messages?.find(m => m.role === "system")?.content || "";
      setPrompt(sys);
      setStatus({type:"ok", msg:"Prompt cargado"});
    } catch(e) { setStatus({type:"err", msg:String(e.message||e)}); }
  };

  const save = async () => {
    if (!apiKey || !assistantId) return setStatus({type:"err", msg:"Falta API key o Assistant ID"});
    try {
      const r = await fetch(`${VAPI_BASE}/assistant/${assistantId}`, {
        method:"PATCH",
        headers: { "Content-Type":"application/json", Authorization: `Bearer ${apiKey}` },
        body: JSON.stringify({ model: { messages: [{ role: "system", content: prompt }] }}),
      });
      if (!r.ok) throw new Error(await r.text());
      setStatus({type:"ok", msg:"Prompt guardado en Vapi"});
    } catch(e) { setStatus({type:"err", msg:String(e.message||e)}); }
  };

  return (
    <section className="card p-4">
      <div className="flex gap-2 mb-3">
        <button className="btn" onClick={load}>Cargar de Vapi</button>
        <button className="btn" onClick={save}>Guardar en Vapi</button>
      </div>
      <textarea rows={22} value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="System prompt..." />
    </section>
  );
}

function KbTab() {
  const [kb, setKb] = useLocalState("upmarket_kb_draft", "");
  return (
    <section className="card p-4">
      <p className="text-sm text-gray-400 mb-2">KB para UpMarket. Pega/edita aquí y luego súbela al panel de UpMarket.</p>
      <textarea rows={22} value={kb} onChange={e=>setKb(e.target.value)} />
    </section>
  );
}

function VoiceTab({ apiKey, assistantId, setStatus }) {
  const [voice, setVoice] = useLocalState("vapi_voice", { provider: "11labs", voiceId: "", language: "es-ES" });
  const save = async () => {
    if (!apiKey || !assistantId) return setStatus({type:"err", msg:"Falta API key o Assistant ID"});
    try {
      const r = await fetch(`${VAPI_BASE}/assistant/${assistantId}`, {
        method:"PATCH",
        headers: { "Content-Type":"application/json", Authorization: `Bearer ${apiKey}` },
        body: JSON.stringify({ voice: { provider: voice.provider, voiceId: voice.voiceId }, language: voice.language }),
      });
      if (!r.ok) throw new Error(await r.text());
      setStatus({type:"ok", msg:"Voz guardada"});
    } catch(e) { setStatus({type:"err", msg:String(e.message||e)}); }
  };
  return (
    <section className="card p-4 grid grid-cols-1 md:grid-cols-3 gap-3">
      <div>
        <label className="text-xs text-gray-400">Provider</label>
        <select value={voice.provider} onChange={e=>setVoice({...voice, provider:e.target.value})}>
          <option value="11labs">ElevenLabs</option>
          <option value="azure">Azure</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>
      <div>
        <label className="text-xs text-gray-400">Voice ID</label>
        <input value={voice.voiceId} onChange={e=>setVoice({...voice, voiceId:e.target.value})} />
      </div>
      <div>
        <label className="text-xs text-gray-400">Idioma</label>
        <select value={voice.language} onChange={e=>setVoice({...voice, language:e.target.value})}>
          <option value="es-ES">es-ES</option>
          <option value="en-US">en-US</option>
        </select>
      </div>
      <div className="md:col-span-3"><button className="btn" onClick={save}>Guardar</button></div>
    </section>
  );
}

function TestTab({ apiKey, assistantId, setStatus }) {
  const start = async () => {
    setStatus({type:"ok", msg:"Llamada de prueba: usa el SDK web de Vapi (vapi-web). Integración pendiente en este panel."});
  };
  return (
    <section className="card p-4">
      <p className="text-sm text-gray-400 mb-3">Usa el SDK <code>@vapi-ai/web</code> para iniciar una llamada de prueba en el navegador.</p>
      <button className="btn" onClick={start}>Iniciar llamada de prueba</button>
    </section>
  );
}

function HistoryTab({ apiKey, setStatus }) {
  const [calls, setCalls] = useState([]);
  const load = async () => {
    if (!apiKey) return setStatus({type:"err", msg:"Falta API key"});
    try {
      const r = await fetch(`${VAPI_BASE}/call?limit=20`, { headers: { Authorization: `Bearer ${apiKey}` }});
      if (!r.ok) throw new Error(await r.text());
      setCalls(await r.json());
    } catch(e) { setStatus({type:"err", msg:String(e.message||e)}); }
  };
  return (
    <section className="card p-4">
      <button className="btn mb-3" onClick={load}>Cargar últimas llamadas</button>
      <div className="space-y-2">
        {calls.map(c => (
          <div key={c.id} className="border border-gray-800 rounded p-3">
            <div className="flex justify-between text-sm">
              <span>{c.startedAt}</span>
              <span className="text-gray-400">{c.endedReason}</span>
            </div>
            <details className="mt-2">
              <summary className="cursor-pointer text-sm text-blue-400">Transcripción</summary>
              <pre className="text-xs whitespace-pre-wrap mt-2">{c.transcript || "(sin transcripción)"}</pre>
            </details>
          </div>
        ))}
        {calls.length === 0 && <p className="text-sm text-gray-500">Sin llamadas cargadas.</p>}
      </div>
    </section>
  );
}

function EmergencyTab({ apiKey, setStatus }) {
  const [items, setItems] = useState([]);
  const KEYWORDS = ["emergencia","fuego","incendio","112","ambulancia","policía","robo","sangre","desmayo"];
  const scan = async () => {
    if (!apiKey) return setStatus({type:"err", msg:"Falta API key"});
    try {
      const r = await fetch(`${VAPI_BASE}/call?limit=50`, { headers: { Authorization: `Bearer ${apiKey}` }});
      if (!r.ok) throw new Error(await r.text());
      const all = await r.json();
      const flagged = all.filter(c => KEYWORDS.some(k => (c.transcript||"").toLowerCase().includes(k)));
      setItems(flagged);
      setStatus({type:"ok", msg:`Llamadas analizadas. Marcadas: ${flagged.length}`});
    } catch(e) { setStatus({type:"err", msg:String(e.message||e)}); }
  };
  return (
    <section className="card p-4">
      <p className="text-sm text-gray-400 mb-2">Escanea las últimas 50 llamadas buscando palabras clave de emergencia.</p>
      <button className="btn mb-3" onClick={scan}>Analizar llamadas</button>
      <div className="space-y-2">
        {items.map(c => (
          <div key={c.id} className="border border-red-900 rounded p-3 bg-red-950/30">
            <div className="text-sm">{c.startedAt} · {c.endedReason}</div>
            <pre className="text-xs whitespace-pre-wrap mt-2">{c.transcript}</pre>
          </div>
        ))}
        {items.length === 0 && <p className="text-sm text-gray-500">Sin llamadas marcadas.</p>}
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
