name: Verify assistant config

# Lee el assistant y muestra lo importante para verificar (prompt, voz, modelo).
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar config clave del assistant
        env:
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          ASSISTANT_ID: ${{ secrets.VAPI_ASSISTANT_ID }}
        run: |
          set -euo pipefail
          A=$(curl -s "https://api.vapi.ai/assistant/$ASSISTANT_ID" -H "Authorization: Bearer $VAPI_API_KEY")
          echo "=== MODELO (LLM) ==="
          echo "$A" | jq '{provider: .model.provider, model: .model.model}'
          echo "=== VOZ ==="
          echo "$A" | jq '.voice | {provider, voiceId, model, pronunciationDictionaryLocators}'
          echo "=== firstMessage ==="
          echo "$A" | jq -r '.firstMessage'
          echo "=== PROMPT — marcadores de versión ==="
          C=$(echo "$A" | jq -r '.model.messages[0].content')
          printf '%s\n' "$C" | grep -n "pasado mañana" >/dev/null && echo "  [✓ fecha 'pasado mañana' presente]" || echo "  [✗ FALTA 'pasado mañana']"
          printf '%s\n' "$C" | grep -n "en total por" >/dev/null && echo "  [✓ regla precio 'en total' presente]" || echo "  [✗ FALTA regla 'en total']"
          printf '%s\n' "$C" | grep -n "la pronunciación la gestiona la voz" >/dev/null && echo "  [✓ nota de pronunciación presente]" || echo "  [✗ FALTA nota de pronunciación]"
          printf '%s\n' "$C" | grep -n "haz tu reserva punto a pe pe" >/dev/null && echo "  [✓ URL hablada presente]" || echo "  [✗ FALTA la URL hablada]"
          printf '%s\n' "$C" | grep -nE "checking|I checkout" >/dev/null && echo "  [✗ contiene anglicismos prohibidos]" || echo "  [✓ sin anglicismos prohibidos]"
